<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MealMind AI</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --accent: #28a745;
            --shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
        }
        body.dark-mode {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #f4f4f4;
            --accent: #00ff88;
            --shadow: 0 4px 15px rgba(0, 255, 136, 0.4);
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex; justify-content: center; padding-top: 50px; 
            transition: background 0.5s ease;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0; min-height: 100vh;
        }

        .bg-login { background-image: url('assets/food.jpg'); }
        .bg-dashboard { background-image: url('assets/food2.jpg'); }

        .card { 
            background: var(--card-bg); padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 350px; 
            text-align: center;
        }
        
        button { 
            width: 100%; padding: 12px; background: var(--accent); color: white; 
            border: none; border-radius: 8px; cursor: pointer; margin-bottom: 8px;
            transition: 0.3s; font-weight: bold;
        }
        button:hover { box-shadow: var(--shadow); transform: scale(1.02); }
        .secondary-btn { background: #6c757d; }
        
        .nav-bar { 
            display: flex; gap: 10px; margin-bottom: 30px; 
            padding-bottom: 20px; border-bottom: 1px solid rgba(128,128,128,0.2); 
        }
        .nav-bar button { font-size: 12px; padding: 8px; flex: 1; }

        .theme-toggle {
            width: auto !important; padding: 10px 25px; margin-top: 20px;
            background: transparent; border: 2px solid var(--accent);
            color: var(--accent); border-radius: 50px;
        }

        #about-container, #dashboard { display: none; }
    </style>
</head>
<body class="bg-login">

    <!-- LOGIN PAGE -->
    <div class="card" id="login-container">
        <img src="assets/logo.png" alt="MealMind AI Logo" style="width: 100%; margin-bottom: 20px;">
        <input type="text" id="username" placeholder="Username (guest)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
        <input type="password" id="password" placeholder="Password (password1)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
        <button onclick="login()">Enter MealMind</button>
        <button class="secondary-btn" onclick="showSection('about-container')">About Us</button>
        <button class="theme-toggle" onclick="toggleTheme()">Toggle Dark/Light Mode</button>
    </div>

    <!-- ABOUT PAGE -->
    <div class="card" id="about-container">
        <h2>About MealMind AI</h2>
        <p>MealMind AI uses advanced technology to help you reduce food waste.</p>
        <button class="secondary-btn" onclick="goBack()">Back</button>
    </div>

    <!-- DASHBOARD PAGE -->
    <div class="card" id="dashboard">
        <img src="assets/logo.png" alt="MealMind AI Logo" style="width: 80%; margin-bottom: 20px;">
        <div class="nav-bar">
            <button onclick="showSection('about-container')">About</button>
            <button onclick="location.reload()" class="secondary-btn">Logout</button>
        </div>
        <h1>Welcome, <span id="display-user"></span>!</h1>
        <p>Your AI pantry assistant is ready.</p>
        <button class="theme-toggle" onclick="toggleTheme()">Switch Theme</button>
    </div>

    <script>
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }

        function showSection(sectionId) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('about-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById(sectionId).style.display = 'block';

            const isDark = document.body.classList.contains('dark-mode');
            document.body.className = (sectionId === 'dashboard') ? 'bg-dashboard' : 'bg-login';
            if (isDark) document.body.classList.add('dark-mode');
        }

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === "guest" && pass === "password1") {
                showSection('dashboard');
                document.getElementById('display-user').innerText = user;
            } else {
                alert("Invalid Login.");
            }
        }

        function goBack() {
            const user = document.getElementById('display-user').innerText;
            user ? showSection('dashboard') : showSection('login-container');
        }
    </script>
</body>
</html>
